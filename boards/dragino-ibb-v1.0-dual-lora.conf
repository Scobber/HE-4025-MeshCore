# Dragino IoT Base Board IBB-v1.0 / HE-4025 / dual SX1276 profile.
#
# This profile is for the 2x LoRa radio hardware variant. It captures the
# expected two-radio wiring, but the current daemon runtime only opens the
# primary radio fields below. Keep radio_count=2 and radio1_* values here so the
# next runtime step can instantiate the second SX1276 without changing the board
# profile shape.

role=repeater
region=AU915
device_name=dragino-ibb-v1.0-dual-lora
radio_count=2

# Primary radio, used by the current daemon.
frequency=915800000
spreading_factor=11
bandwidth=250000
coding_rate=5
tx_power=17
sync_word=0x12

spi_device=/dev/spidev0.0
spi_speed=1000000
pin_nss=-1
pin_reset=?
pin_dio0=?
pin_dio1=?
pin_dio2=?

# Explicit radio0 mirror for future dual-radio runtime support.
radio0_name=lorawan0
radio0_frequency=915800000
radio0_spi_device=/dev/spidev0.0
radio0_spi_speed=1000000
radio0_pin_nss=-1
radio0_pin_reset=?
radio0_pin_dio0=?
radio0_pin_dio1=?
radio0_pin_dio2=?

# Secondary radio. Fill these with the second SX1276 bus/chip-select/GPIOs.
radio1_name=lorawan1
radio1_frequency=916000000
radio1_spi_device=/dev/spidev0.1
radio1_spi_speed=1000000
radio1_pin_nss=-1
radio1_pin_reset=?
radio1_pin_dio0=?
radio1_pin_dio1=?
radio1_pin_dio2=?

poll_ms=5
repeat_raw=false

web_enabled=true
web_bind=0.0.0.0
web_port=8080

ota_enabled=false
ota_token=change-me
ota_image_path=/tmp/meshcore-sysupgrade.bin
ota_keep_config=false
ota_max_upload_bytes=16777216

