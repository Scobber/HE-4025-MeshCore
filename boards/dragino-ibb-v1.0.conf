# Dragino IoT Base Board IBB-v1.0 / HE-4025 / SX1276 profile.
#
# The GPIO numbers below are intentionally placeholders. Confirm whether your
# IBB-v1.0 routes the SX1276 directly to the HE-4025 SPI controller or through
# an ATmega/Arduino-side MCU before expecting /dev/spidev reads to work.

role=repeater
region=AU915
frequency=915800000
spreading_factor=11
bandwidth=250000
coding_rate=5
tx_power=17
sync_word=0x12

spi_device=/dev/spidev0.0
spi_speed=1000000

# Use -1 if the HE-4025 SPI controller owns chip-select through /dev/spidevX.Y.
# Set a GPIO number only if SX1276 NSS is wired to a standalone HE GPIO.
pin_nss=-1

# Fill these with the HE-4025 Linux GPIO numbers, not Arduino digital labels.
pin_reset=?
pin_dio0=?
pin_dio1=?
pin_dio2=?

poll_ms=5
repeat_raw=false

device_name=dragino-ibb-v1.0
web_enabled=true
web_bind=0.0.0.0
web_port=8080

# OTA is present but locked until you set both ota_enabled=true and a real token.
ota_enabled=false
ota_token=change-me
ota_image_path=/tmp/meshcore-sysupgrade.bin
ota_keep_config=false
ota_max_upload_bytes=16777216
